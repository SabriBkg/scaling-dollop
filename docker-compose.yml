services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: safenet
      POSTGRES_USER: safenet
      POSTGRES_PASSWORD: safenet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safenet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: ./backend
    command: poetry run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: poetry run celery -A safenet_backend worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  beat:
    build: ./backend
    command: poetry run celery -A safenet_backend beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    # CRITICAL: In production (Railway), this service must run as exactly ONE instance.
    # Multiple beat instances double-fire retries. Enforce via Railway "replicas: 1" config.

  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - web

volumes:
  postgres_data:
  frontend_node_modules:
